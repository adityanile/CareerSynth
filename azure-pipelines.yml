trigger:
- master

resources:
- repo: self

variables:
  dockerRegistryServiceConnection: 'f6a9854f-11ac-49ec-b9ef-efcd89128fc6'
  backendRepository: 'careersynth-backend'
  frontendRepository: 'careersynth-frontend'
  containerRegistry: 'nilecr.azurecr.io'
  backendDockerfile: '$(Build.SourcesDirectory)/backend/Dockerfile'
  frontendDockerfile: '$(Build.SourcesDirectory)/ui/Dockerfile'
  tag: '$(Build.BuildId)'

  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and Test Stage
  jobs:
  - job: buildBackend
    displayName: Building Backend CareerSynth
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build Backend Docker Image
      inputs:
        command: build
        repository: $(backendRepository)
        dockerfile: $(backendDockerfile)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)

    - bash: |
        docker run -v /tmp:/tmp $(containerRegistry)/$(backendRepository):$(tag) pytest --junitxml=/tmp/test-report.xml 
      displayName: Running PyTest on Backend

    - task: PublishTestResults@2
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '/tmp/test-report.xml'
        searchFolder: '/tmp'
        failTaskOnFailedTests: true
        failTaskOnFailureToPublishResults: true
        failTaskOnMissingResultsFile: true
        testRunTitle: 'Backend Tests'

    - task: Docker@2
      displayName: Push The Backend Docker Image
      inputs:
        command: push
        repository: $(backendRepository)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)

  - job: buildFrontend
    displayName: Building Frontend Carrsynth
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build Frontend and Push to Registry
      inputs:
        command: buildAndPush
        repository: $(frontendRepository)
        dockerfile: $(frontendDockerfile)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)

