# Docker
# Build and push an image to Azure Container Registry
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- master

resources:
- repo: self

variables:
  # Container registry service connection established during pipeline creation
  dockerRegistryServiceConnection: 'f6a9854f-11ac-49ec-b9ef-efcd89128fc6'
  backendRepository: 'careersynth-backend'
  frontendRepository: 'careersynth-frontend'
  containerRegistry: 'nilecr.azurecr.io'
  backendDockerfile: '$(Build.SourcesDirectory)/backend/Dockerfile'
  frontendDockerfile: '$(Build.SourcesDirectory)/ui/Dockerfile'
  tag: '$(Build.BuildId)'

  # Agent VM image name
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build Backend and Push To Registry
      inputs:
        command: buildAndPush
        repository: $(backendRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
    - task: Docker@2
      displayName: Build Frontend and Push to Registry
      inputs:
        command: buildAndPush
        repository: $(frontendRepository)
        dockerfile: $(frontendDockerfile)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
    
